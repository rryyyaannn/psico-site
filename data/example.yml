problem:
  title: "Você já se sentiu assim?"
  text: >
    Por fora, talvez a sua vida continue funcionando. Você segue trabalhando,
    sustentando relações, cumprindo responsabilidades e fazendo o que precisa ser feito.

    Mas, por dentro, a mente não desacelera. Você pensa demais, antecipa cenários,
    tenta evitar erros, controlar emoções, revisar decisões e impedir que algo negativo aconteça.

    Aos poucos, isso se traduz em cansaço, inquietação e uma forma de viver guiada
    mais pela prevenção do sofrimento do que pelo que faz sentido para você.

    E isso não fica só dentro de você. Pode afetar a forma como se relaciona,
    trabalha, descansa, se posiciona e conduz a própria rotina. Decisões passam
    a ser tomadas pelo medo, conversas ficam mais tensas, o prazer diminui e até
    conquistas importantes parecem perder o sabor.

    A vida continua acontecendo — mas já não é vivida com presença, leveza e direção.

impact:
  title: "Como isso pode aparecer na sua vida:"
  areas:
    - title: "Nos relacionamentos"
      items:
        - "Dificuldades na comunicação"
        - "Medo de errar, decepcionar ou frustrar"
        - "Sensação de não ser digno de amor"
        - "Oscilação entre se adaptar demais e se afastar"

    - title: "Na rotina"
      items:
        - "Dias vividos no automático, sem presença"
        - "Sensação de nunca ter feito o suficiente"
        - "Dificuldade de descansar sem culpa"
        - "Alternância entre excesso e travamento"

    - title: "No trabalho e estudos"
      items:
        - "Dificuldade de desligar a mente"
        - "Sensação constante de estar em falta"
        - "Procrastinação"
        - "Estresse e exaustão"

    - title: "Na relação consigo"
      items:
        - "Autoestima fragilizada"
        - "Autocrítica constante"
        - "Foco nas falhas e erros"
        - "Dificuldade de reconhecer o próprio valor e os próprios limites"

    - title: "Emocionalmente"
      items:
        - "Sensação recorrente de esgotamento"
        - "Ansiedade, culpa e estresse acumulados"
        - "Desconexão de si e sensação de vazio"
        - "Solidão e sensação de ter que dar conta de tudo sozinho"

manifesto:
  highlight: >
    Meu trabalho é ajudar pessoas que estão cansadas de viver em um estado constante
    de inquietação, controle excessivo e distanciamento de si.
  text: >
    A proposta não é apenas aliviar sintomas, mas compreender os padrões emocionais,
    relacionais e cognitivos que sustentam esse modo de viver — para, a partir disso,
    construir uma forma mais saudável, leve e significativa de existir.

    Aqui, compreensão profunda e aplicação prática caminham juntas para que a mudança
    não permaneça apenas no entendimento racional, mas possa ser vivida no cotidiano,
    nas relações, nas escolhas e na forma como você conduz a própria vida.

