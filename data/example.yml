hero:
  title: "Psi e humana"
  subtitle: "Para uma vida leve e significativa"
  description: >
    Psicoterapia, planejamento de rotina e materiais para quem vive sobrecarregado,
    com a mente acelerada e desconectado do presente.

    Um espaço para compreender padrões emocionais, descobrir novas formas de existir
