faq:
  - question: "Como funciona a primeira sessão?"
    answer: "A primeira sessão é um espaço de acolhimento e escuta. Conversamos sobre o que te trouxe até aqui, suas expectativas e como posso te ajudar. Sem pressão, no seu tempo."
  - question: "O atendimento é online?"
    answer: "Sim, todos os atendimentos são realizados 100% online, por videochamada, com a mesma qualidade e acolhimento de uma sessão presencial."
  - question: "Quanto tempo dura o processo terapêutico?"
    answer: "Cada pessoa tem seu ritmo. O processo é construído junto, respeitando seu momento e suas necessidades. Não existe prazo fixo."
  - question: "Como faço para agendar?"
    answer: "Você pode entrar em contato pelo WhatsApp ou pelo formulário de contato nesta página. Vou te responder o mais breve possível."

