method:
  title: "Como funciona o meu trabalho?"
  text: >
    Meu trabalho parte de um princípio simples: não é possível construir mudanças
    consistentes sem antes desenvolver clareza sobre como você está hoje.

    Por isso, independentemente do formato — seja na psicoterapia, no planejamento
    de rotina ou nos materiais —, existe sempre um convite à consciência.

    Em alguns processos, isso acontece de forma mais estruturada, como na terapia
    ou no planejamento de rotina, em que investigamos com profundidade seus padrões
    e contexto de vida.

    Em outros, acontece de forma mais dinâmica, como nos materiais e baralhos,
    por meio de perguntas, reflexões e direcionamentos que te ajudam a se observar
    e se compreender ao longo do processo.

    A partir dessa consciência, construímos mudanças que realmente façam sentido
    para você — respeitando seu contexto, seu ritmo e o momento em que se encontra.

    Na psicoterapia, esse trabalho se dá de forma personalizada e aprofundada,
    com base em abordagens como a Terapia Cognitivo-Comportamental e a Terapia do Esquema.

    Nos demais formatos, esses mesmos princípios são organizados de forma prática,
    para que você possa aplicar o processo no dia a dia, de maneira sustentável
    e alinhada às suas necessidades.

about:
  title: "Conheça esta psi, Emanuele Bohry"
  text: >
    Desde cedo, estive em ambientes com muitas demandas, responsabilidades e pressão —
    incluindo contextos organizacionais em nível de direção.

    Essa vivência me deu uma compreensão profunda sobre como o excesso de cobrança,
    a autoexigência e a dificuldade de descansar podem afetar a saúde mental,
    os relacionamentos e a forma como conduzimos a vida.

    Hoje, como psicóloga, trabalho com pessoas que vivem sobrecarregadas,
    com a mente acelerada e desconectadas do presente — ajudando-as a compreender
    seus padrões emocionais e a construir uma vida mais leve, consciente e significativa.

